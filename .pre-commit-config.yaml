repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^(scripts/|prototypes/)
      - id: ruff-format
        exclude: ^(scripts/|prototypes/)

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright src/ tests/
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest -x -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
